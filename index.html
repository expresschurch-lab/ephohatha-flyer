<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EPHPHATHA - Custom Flyer Generator</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://i.imgur.com/G3F2j2X.png">
    <!-- Main Style File -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Modern Mobile Header -->
<div class="header-band">
    <div class="profile-pic"></div>
    <div class="header-text">
        <div class="main-title">I WILL ATTEND! CONCERT FLYER</div>
        <div class="sub-title">EPHPHATHA MEGA YOUTH CONCERT - CAC METROPOLIS</div>
    </div>
    <div class="app-icon">
        <img src="https://i.imgur.com/G3F2j2X.png" alt="App Icon" style="width:100%; height:auto;">
    </div>
</div>

<div class="app-wrapper">

    <!-- Card 1: Flyer Preview -->
    <div class="card">
        <div class="flyer-preview">
            <!-- Canvas is drawn here by JavaScript -->
            <canvas id="imageCanvas"></canvas>
        </div>
        <div class="live-preview-tag">Live preview — updates as you type</div>
    </div>

    <!-- Card 2: Steps / Controls -->
    <div class="card steps-container">
        
        <!-- Step 1: Add Photo -->
        <div class="step-label">
            <div class="step-number">1</div>
            <div>Add your photo</div>
        </div>
        
        <div class="upload-btn-wrapper">
            <div class="circle-upload-btn">
                <span class="camera-icon">📷</span>
                <span>Add Photo</span>
            </div>
            <input type="file" id="fileInput" accept="image/*" />
        </div>

        <!-- Step 2: Your Name -->
        <div class="step-label">
            <div class="step-number">2</div>
            <div>Your name</div>
        </div>
        
        <input type="text" id="nameInput" class="form-input" placeholder="e.g. Adeyemi Joshua" maxlength="30">

        <!-- Step 3: Customize Font -->
        <div class="step-label">
            <div class="step-number">3</div>
            <div>Customize font</div>
        </div>
        
        <select id="fontSelector" class="form-select">
            <option value="Poppins">Poppins</option>
            <option value="Arial">Arial</option>
            <option value="Georgia">Georgia</option>
            <option value="Times New Roman">Times New Roman</option>
        </select>
        
        <div class="slider-container">
            <input type="range" id="fontSizeSlider" class="slider" min="20" max="60" value="46">
            <span id="fontSizeValue" class="slider-value">46px</span>
        </div>
        
        <div class="auto-shrink-text">Note: Text automatically shrinks to fit the name box.</div>

        <!-- Final Download Button -->
        <div class="download-container">
            <button id="downloadBtn" disabled>Download My Flyer</button>
            <div class="download-subtext">PNG, ready to share on WhatsApp & social media</div>
        </div>

    </div>

</div>

<!-- Main Script File -->
<script src="script.js"></script>

</body>
</html>
